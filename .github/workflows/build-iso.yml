name: Build and Publish Dakota Live ISO

on:
  push:
    branches: [main]
    paths:
      - 'dakota/**'
      - 'dakota-nvidia/**'
      - 'justfile'
      - '.github/workflows/build-iso.yml'
  schedule:
    # Rebuild daily at 03:00 UTC to pick up Dakota image updates
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Build ISO but skip uploading to R2 (dry run)'
        required: false
        default: false
        type: boolean

jobs:
  build-and-publish:
    name: Build ${{ matrix.target }} Live ISO
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [dakota, dakota-nvidia]
    permissions:
      contents: read
      packages: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - name: Disk space after free
        run: |
          echo "=== Disk space after free-disk-space ==="
          df -h /
          df -i /
          echo "=== Podman info ==="
          sudo podman info --format 'Driver: {{.Store.GraphDriverName}}  GraphRoot: {{.Store.GraphRoot}}' 2>/dev/null || true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y just podman buildah rclone mtools xorriso

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Live ISO
        run: |
          echo "=== Disk space before build ==="
          df -h /
          # Build on /var/iso-build (large root partition, ~119GB free after free-disk-space).
          # The squash-to-single-layer approach reduces VFS import from ~720GB to ~6GB,
          # so no XFS staging is needed. Total peak disk usage: ~40GB.
          sudo mkdir -p /var/iso-build
          sudo $(command -v just) installer_channel=stable output_dir=/var/iso-build iso-sd-boot ${{ matrix.target }}
          # Copy final ISO to workspace for artifact/upload steps
          mkdir -p output
          sudo cp /var/iso-build/*.iso output/ 2>/dev/null || true
          sudo chown -R "$USER:$(id -gn)" output/

      - name: Disk space after build
        run: |
          echo "=== Disk space after ISO build ==="
          df -h /
          echo "=== Podman images ==="
          sudo podman images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
          echo "=== Podman system df ==="
          sudo podman system df -v 2>/dev/null || sudo podman system df
          echo "=== Output directory ==="
          du -sh output/* 2>/dev/null || true

      - name: Clean up podman images
        run: |
          echo "=== Removing podman images to free space ==="
          sudo podman rmi localhost/${{ matrix.target }}-installer 2>/dev/null || true
          sudo podman system prune -af --volumes 2>/dev/null || true
          echo "=== Disk space after cleanup ==="
          df -h /
          sudo podman images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" 2>/dev/null || true

      - name: Fix output directory ownership
        # Ownership already handled in the build step; this is a safety net.
        run: sudo chown -R "$USER:$(id -gn)" output/ 2>/dev/null || true

      - name: Compute ISO name
        id: iso
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "dated=${{ matrix.target }}-live-${DATE}-${SHA}.iso" >> "$GITHUB_OUTPUT"
          echo "path=output/${{ matrix.target }}-live.iso" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"
          CHECKSUM_PATH="output/${DATED}-CHECKSUM"
          LATEST="${{ matrix.target }}-live-latest.iso"
          LATEST_CHECKSUM_PATH="output/${LATEST}-CHECKSUM"
          # Full sha256sum format (hash + filename) so users can run: sha256sum -c
          # Two manifests: one with the dated filename, one with the "latest" alias.
          # They share the same hash but different recorded filenames so both work.
          sha256sum "$ISO" | sed "s|${ISO}|${DATED}|" | tee "$CHECKSUM_PATH"
          sha256sum "$ISO" | sed "s|${ISO}|${LATEST}|" > "$LATEST_CHECKSUM_PATH"
          echo "path=${CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"
          echo "name=${DATED}-CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "latest_path=${LATEST_CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Upload ISO to Cloudflare R2
        if: ${{ inputs.skip_upload != true && github.event_name != 'pull_request' }}
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"
          LATEST="${{ steps.checksum.outputs.latest }}"

          echo "==> Uploading as $DATED ..."
          rclone copyto --log-level INFO --checksum --s3-no-check-bucket \
            "$ISO" "R2:testing/${DATED}"

          echo "==> Updating ${LATEST} ..."
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "$ISO" "R2:testing/${LATEST}"

          echo "==> Uploading checksum as ${{ steps.checksum.outputs.name }} ..."
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "${{ steps.checksum.outputs.path }}" \
            "R2:testing/${{ steps.checksum.outputs.name }}"

          echo "==> Updating ${LATEST}-CHECKSUM ..."
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "${{ steps.checksum.outputs.latest_path }}" \
            "R2:testing/${LATEST}-CHECKSUM"

          echo "==> Done. Public URLs:"
          echo "    https://projectbluefin.dev/${LATEST}"
          echo "    https://projectbluefin.dev/${LATEST}-CHECKSUM"

      - name: Boot verification (UEFI + serial)
        timeout-minutes: 10
        run: |
          ISO="${{ steps.iso.outputs.path }}"

          sudo apt-get install -y qemu-system-x86 ovmf socat imagemagick -qq

          echo "==> Booting $ISO ..."

          # Locate UEFI firmware (paths vary by Ubuntu release)
          EFI_CODE=""; EFI_VARS=""
          for f in /usr/share/OVMF/OVMF_CODE_4M.fd \
                   /usr/share/OVMF/OVMF_CODE.fd \
                   /usr/share/edk2/ovmf/OVMF_CODE.fd; do
            [ -f "$f" ] && EFI_CODE="$f" && break
          done
          for f in /usr/share/OVMF/OVMF_VARS_4M.fd \
                   /usr/share/OVMF/OVMF_VARS.fd \
                   /usr/share/edk2/ovmf/OVMF_VARS.fd; do
            if [ -f "$f" ]; then
              cp "$f" /tmp/EFI_VARS.fd
              EFI_VARS="/tmp/EFI_VARS.fd"
              break
            fi
          done

          PFLASH=()
          if [ -n "$EFI_CODE" ] && [ -n "$EFI_VARS" ]; then
            echo "==> UEFI firmware: $EFI_CODE"
            PFLASH+=(-drive "if=pflash,format=raw,readonly=on,file=$EFI_CODE")
            PFLASH+=(-drive "if=pflash,format=raw,file=$EFI_VARS")
          fi

          sudo qemu-system-x86_64 \
            -machine type=q35,accel=kvm \
            -cpu host -m 4G -smp 2 \
            "${PFLASH[@]}" \
            -cdrom "$ISO" -boot d \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -serial file:/tmp/serial.log \
            -display none \
            -daemonize

          # Wait for monitor socket
          for i in $(seq 1 30); do
            [ -S /tmp/qemu-monitor.sock ] && break
            sleep 2
          done

          echo "==> Waiting up to 5 minutes for live environment to be ready..."
          for i in $(seq 1 60); do
            if sudo grep -q "DAKOTA_LIVE_READY" /tmp/serial.log 2>/dev/null; then
              echo "==> Live environment ready after $((i * 5))s"
              break
            fi
            [ "$i" -eq 60 ] && echo "WARNING: DAKOTA_LIVE_READY not seen in serial log after 5m" || true
            sleep 5
          done

          # Capture screenshot
          echo "screendump /tmp/screenshot.ppm" | \
            sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true
          sleep 2
          if sudo test -f /tmp/screenshot.ppm; then
            sudo convert /tmp/screenshot.ppm screenshot.png 2>/dev/null || \
              sudo cp /tmp/screenshot.ppm screenshot.png
            echo "==> Screenshot saved"
          fi

          echo "quit" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true

          # Fail the job if the live environment never reached the ready state.
          # Accept either the explicit DAKOTA_LIVE_READY token (written directly to
          # /dev/ttyS0 by live-ready.service) or the systemd completion message from
          # the same service, which always appears on the console regardless of TTY
          # routing.
          sudo grep -qE "DAKOTA_LIVE_READY|Finished live-ready\.service" /tmp/serial.log || \
            { echo "ERROR: Live environment did not reach ready state"; sudo tail -50 /tmp/serial.log; exit 1; }

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.iso.outputs.dated }}
          path: ${{ steps.iso.outputs.path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload SHA256 checksum as artifact
        uses: actions/upload-artifact@v4
        if: steps.checksum.outputs.path != ''
        with:
          name: checksum-${{ steps.iso.outputs.dated }}
          path: ${{ steps.checksum.outputs.path }}
          if-no-files-found: warn
          retention-days: 7

      - name: Upload boot screenshot as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: boot-screenshot-${{ matrix.target }}
          path: screenshot.png
          if-no-files-found: warn
