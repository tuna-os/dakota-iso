name: Build and Publish Dakota Live ISO

on:
  push:
    branches: [main]
    paths:
      - 'live/**'
      - 'recipes/**'
      - '.github/workflows/build-iso.yml'
  schedule:
    # Rebuild daily at 03:00 UTC to pick up Dakota image updates
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Build ISO but skip uploading to R2 (dry run)'
        required: false
        default: false
        type: boolean

jobs:
  build-and-publish:
    name: Build Dakota Live ISO (NVIDIA + non-NVIDIA)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y just podman buildah rclone mtools xorriso \
            squashfs-tools dosfstools

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build tacklebox
        run: |
          git clone --depth=1 https://github.com/tuna-os/tacklebox tacklebox-src
          cd tacklebox-src && go build -o ../tacklebox ./cmd/tacklebox

      # Only the NVIDIA environment is a live squashfs on the ISO.
      # Non-NVIDIA is listed in images.json for the installer catalog but
      # installed via network pull from the NVIDIA live environment.
      - name: Build live image — dakota-nvidia
        run: |
          sudo podman build \
            --cap-add sys_admin --security-opt label=disable \
            --layers \
            --build-arg TARGET=dakota-nvidia \
            --build-arg INSTALLER_CHANNEL=stable \
            -t localhost/dakota-nvidia-live:latest \
            ./live

      - name: Disk space before ISO build
        run: df -h /

      - name: Build ISO
        run: |
          sudo mkdir -p /var/iso-build
          sudo ./tacklebox build recipes/dakota.json \
            --iso /var/iso-build/dakota-live.iso
          mkdir -p output
          sudo cp /var/iso-build/dakota-live.iso output/
          sudo chown -R "$USER:$(id -gn)" output/

      - name: Compute ISO name
        id: iso
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "dated=dakota-live-${DATE}-${SHA}.iso" >> "$GITHUB_OUTPUT"
          echo "path=output/dakota-live.iso" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"
          CHECKSUM_PATH="output/${DATED}-CHECKSUM"
          LATEST_CHECKSUM_PATH="output/dakota-live-latest.iso-CHECKSUM"
          sha256sum "$ISO" | sed "s|${ISO}|${DATED}|" | tee "$CHECKSUM_PATH"
          sha256sum "$ISO" | sed "s|${ISO}|dakota-live-latest.iso|" > "$LATEST_CHECKSUM_PATH"
          echo "path=${CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"
          echo "latest_path=${LATEST_CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload ISO to Cloudflare R2
        if: ${{ inputs.skip_upload != true && github.event_name != 'pull_request' }}
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"

          echo "==> Uploading as ${DATED} ..."
          rclone copyto --log-level INFO --checksum --s3-no-check-bucket \
            "$ISO" "R2:testing/${DATED}"

          echo "==> Updating dakota-live-latest.iso ..."
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "$ISO" "R2:testing/dakota-live-latest.iso"

          echo "==> Uploading checksums ..."
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "${{ steps.checksum.outputs.path }}" "R2:testing/${DATED}-CHECKSUM"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "${{ steps.checksum.outputs.latest_path }}" \
            "R2:testing/dakota-live-latest.iso-CHECKSUM"

          echo "==> Done. https://projectbluefin.dev/dakota-live-latest.iso"

      - name: Boot verification (UEFI + serial)
        timeout-minutes: 10
        run: |
          sudo apt-get install -y qemu-system-x86 ovmf socat imagemagick -qq

          ISO="${{ steps.iso.outputs.path }}"
          echo "==> Booting $ISO ..."

          EFI_CODE=""; EFI_VARS=""
          for f in /usr/share/OVMF/OVMF_CODE_4M.fd \
                   /usr/share/OVMF/OVMF_CODE.fd \
                   /usr/share/edk2/ovmf/OVMF_CODE.fd; do
            [ -f "$f" ] && EFI_CODE="$f" && break
          done
          for f in /usr/share/OVMF/OVMF_VARS_4M.fd \
                   /usr/share/OVMF/OVMF_VARS.fd \
                   /usr/share/edk2/ovmf/OVMF_VARS.fd; do
            if [ -f "$f" ]; then
              cp "$f" /tmp/EFI_VARS.fd
              EFI_VARS="/tmp/EFI_VARS.fd"
              break
            fi
          done

          PFLASH=()
          if [ -n "$EFI_CODE" ] && [ -n "$EFI_VARS" ]; then
            PFLASH+=(-drive "if=pflash,format=raw,readonly=on,file=$EFI_CODE")
            PFLASH+=(-drive "if=pflash,format=raw,file=$EFI_VARS")
          fi

          sudo qemu-system-x86_64 \
            -machine type=q35,accel=kvm \
            -cpu host -m 4G -smp 2 \
            "${PFLASH[@]}" \
            -cdrom "$ISO" -boot d \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -serial file:/tmp/serial.log \
            -display none \
            -daemonize

          for i in $(seq 1 30); do
            [ -S /tmp/qemu-monitor.sock ] && break
            sleep 2
          done

          echo "==> Waiting up to 5 minutes for live environment to be ready..."
          for i in $(seq 1 60); do
            if sudo grep -q "DAKOTA_LIVE_READY" /tmp/serial.log 2>/dev/null; then
              echo "==> Live environment ready after $((i * 5))s"
              break
            fi
            [ "$i" -eq 60 ] && echo "WARNING: DAKOTA_LIVE_READY not seen after 5m" || true
            sleep 5
          done

          echo "screendump /tmp/screenshot.ppm" | \
            sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true
          sleep 2
          if sudo test -f /tmp/screenshot.ppm; then
            sudo convert /tmp/screenshot.ppm screenshot.png 2>/dev/null || \
              sudo cp /tmp/screenshot.ppm screenshot.png
          fi
          echo "quit" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true

          sudo grep -qE "DAKOTA_LIVE_READY|Finished live-ready\.service" \
            /tmp/serial.log || \
            { echo "ERROR: Live environment did not reach ready state"; \
              sudo tail -50 /tmp/serial.log; exit 1; }

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.iso.outputs.dated }}
          path: ${{ steps.iso.outputs.path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload SHA256 checksum as artifact
        uses: actions/upload-artifact@v4
        if: steps.checksum.outputs.path != ''
        with:
          name: checksum-${{ steps.iso.outputs.dated }}
          path: ${{ steps.checksum.outputs.path }}
          if-no-files-found: warn
          retention-days: 7

      - name: Upload boot screenshot as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: boot-screenshot
          path: screenshot.png
          if-no-files-found: warn
